name: CI
on:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: 1. Setup_VM_with_Port_998
        run: |
          cat << 'EOF' > vm.c
          #include<stdio.h>
          #include<stdlib.h>
          int mem[1000];
          int main(int argc,char**argv){
          if(argc<3)return 1;
          FILE*f=fopen(argv[0],"rb");if(!f)return 1;
          fseek(f,0,SEEK_END);long sz=ftell(f);rewind(f);
          if(sz<5)return 1;
          char*buf=malloc(sz);fread(buf,1,sz,f);fclose(f);
          char*start=NULL;
          for(long i=0;i<sz-4;i++){if(buf[i]=='_'&&buf[i+1]=='I'&&buf[i+2]=='N'&&buf[i+3]=='C'&&buf[i+4]=='_'){start=buf+i;break;}}
          if(!start)return 1;
          long vm_size=start-buf;long self_pos=0;
          start+=5;int cc=0,v=0;
          for(char*p=start;p<buf+sz;p++){
          if(*p==' ')v=(v<<1)|0;else if(*p=='\t')v=(v<<1)|1;else continue;
          cc++;if(cc%4==0){mem[(cc/4-1)%1000]=v;v=0;}
          }
          FILE*inF=fopen(argv[1],"rb");FILE*outF=fopen(argv[2],"wb");
          if(!inF||!outF)return 1;
          int pc=0,c=0;
          while(c++<9999999){
          int p=pc%1000;
          int ax=mem[p],ay=mem[(p+1)%1000],az=mem[(p+2)%1000],bx=mem[(p+3)%1000],by=mem[(p+4)%1000],bz=mem[(p+5)%1000],cx=mem[(p+6)%1000],cy=mem[(p+7)%1000],cz=mem[(p+8)%1000];
          int aa=ax==9&&ay==9&&az==9?999:ax==8&&ay==9&&az==9?998:ax+ay*10+az*100;
          int ab=bx==9&&by==9&&bz==9?999:bx+by*10+bz*100;
          int ac=cx==9&&cy==9&&cz==9?999:cx+cy*10+cz*100;
          int va;if(aa==999)va=fgetc(inF);else if(aa==998)va=(self_pos<vm_size)?(unsigned char)buf[self_pos++]:EOF;else va=mem[(aa%1000+1000)%1000];
          if(va==EOF)va=-1;
          int vb=ab==999?0:mem[(ab%1000+1000)%1000];int res=vb-va;
          if(ab==999)fputc(res&255,outF);else mem[(ab%1000+1000)%1000]=res;
          if(res<=0){if(pc==ac)break;pc=ac;}else pc=(pc/10*10+10)%1000;
          }
          if(inF)fclose(inF);if(outF)fclose(outF);return 0;
          }
          EOF
          
      - name: 2. Setup_Gen0_Bootstrapper
        run: |
          cat << 'EOF' > boot.c
          #include<stdio.h>
          int main(int argc,char**argv){
          if(argc<3)return 1;
          FILE*vm=fopen("vm.exe","rb");FILE*in=fopen(argv[1],"rb");FILE*out=fopen(argv[2],"wb");
          if(!vm||!in||!out)return 1;
          int c;while((c=fgetc(vm))!=EOF)fputc(c,out);fprintf(out,"_INC_");
          while((c=fgetc(in))!=EOF)fputc(c,out);
          fclose(vm);fclose(in);fclose(out);return 0;
          }
          EOF
          
      - name: 3. Forge_True_Compiler_Subleq_AST
        run: |
          cat << 'EOF' > forge.js
          const fs=require('fs');
          let instrs=[];let labels={};
          function L(n){labels[n]=instrs.length*10;}
          function S(a,b,c){instrs.push({a,b,c});}
          let Z=980,T=981,O=999,R1=998,R2=999;
          L("START");S(T,T,"READ1");
          L("READ1");S(T,T,"R1_1");L("R1_1");
          S(R1,T,"R1_GOT");
          S(T,T,"R1_EOF");
          L("R1_GOT");S(T,O,"R1_G1");L("R1_G1");
          S(T,T,"READ1");
          L("R1_EOF");
          let chars=[95,73,78,67,95];let cidx=0;
          for(let ch of chars){
            cidx++;let p="c"+cidx+"_";
            S(T,T,p+"1");L(p+"1");
            let c=ch;let step=0;
            while(c>=9){S(891,T,p+"s"+step);L(p+"s"+step);c-=9;step++;}
            while(c>=1){S(890,T,p+"s"+step);L(p+"s"+step);c-=1;step++;}
            S(T,O,p+"out");L(p+"out");
          }
          L("READ2");S(T,T,"R2_1");L("R2_1");
          S(R2,T,"R2_GOT");
          S(T,T,"HALT");
          L("R2_GOT");S(T,O,"R2_G1");L("R2_G1");
          S(T,T,"READ2");
          L("HALT");S(Z,Z,"HALT");
          
          let asm=new Array(1000).fill(0);
          asm[890]=1;asm[891]=9;
          let pc=0;
          for(let i=0;i<instrs.length;i++){
            let a=instrs[i].a,b=instrs[i].b,c=instrs[i].c;
            if(typeof c==='string')c=labels[c];
            asm[pc++]=a%10;asm[pc++]=Math.floor(a/10)%10;asm[pc++]=Math.floor(a/100)%10;
            asm[pc++]=b%10;asm[pc++]=Math.floor(b/10)%10;asm[pc++]=Math.floor(b/100)%10;
            asm[pc++]=c%10;asm[pc++]=Math.floor(c/10)%10;asm[pc++]=Math.floor(c/100)%10;
            asm[pc++]=0;
          }
          let map=['    ','   \t','  \t ','  \t\t',' \t  ',' \t \t',' \t\t ',' \t\t\t','\t   ','\t  \t'];
          let out='';
          for(let i=0;i<1000;i++){out+=map[asm[i]];}
          fs.writeFileSync('compiler.inc',out);
          EOF
          node forge.js
          
      - name: 4. Compile_Base_VM_and_Boot
        run: |
          gcc -O3 -o vm.exe vm.c
          gcc -O3 -o compiler.exe boot.c
          chmod +x compiler.exe
          
      - name: 5. Gen_1
        run: ./compiler.exe compiler.inc compiler1.exe
        
      - name: 6. Gen_2
        run: |
          chmod +x compiler1.exe
          ./compiler1.exe compiler.inc compiler2.exe
          
      - name: 7. Gen_3
        run: |
          chmod +x compiler2.exe
          ./compiler2.exe compiler.inc compiler3.exe
          
      - name: 8. Verify True Fixed Point
        run: sha256sum compiler1.exe compiler2.exe compiler3.exe

      - name: 9. Upload compiler.inc Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiler-inc-artifact
          path: compiler.inc
