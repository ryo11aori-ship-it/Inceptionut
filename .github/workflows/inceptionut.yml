name: Inceptionut_CI
on:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 1. Setup Base C Files (VM with Port 998)
        run: |
          cat << 'EOF' > vm.c
          #include<stdio.h>
          #include<stdlib.h>
          #include<string.h>
          int mem[1000];
          int main(int argc,char**argv){
          if(argc<3)return 1;
          FILE*f=fopen(argv[0],"rb");
          if(!f)return 1;fseek(f,0,SEEK_END);long sz=ftell(f);rewind(f);
          char*buf=malloc(sz);fread(buf,1,sz,f);fclose(f);
          char*start=strstr(buf,"_INCEP_");if(!start)return 1;
          long vm_size=start-buf;long self_pos=0;
          start+=7;int cc=0,v=0;
          for(char*p=start;p<buf+sz;p++){
          if(*p==' ')v=(v<<1)|0;else if(*p=='\t')v=(v<<1)|1;else continue;
          cc++;if(cc%4==0){mem[(cc/4-1)%1000]=v;v=0;}
          }
          FILE*inF=fopen(argv[1],"rb");FILE*outF=fopen(argv[2],"wb");
          int pc=0,c=0;
          while(c++<9999999){
          int ax=mem[pc],ay=mem[pc+1],az=mem[pc+2],bx=mem[pc+3],by=mem[pc+4],bz=mem[pc+5],cx=mem[pc+6],cy=mem[pc+7],cz=mem[pc+8];
          int aa=ax==9&&ay==9&&az==9?999:ax==8&&ay==9&&az==9?998:ax+ay*10+az*100;
          int ab=bx==9&&by==9&&bz==9?999:bx+by*10+bz*100;
          int ac=cx==9&&cy==9&&cz==9?999:cx+cy*10+cz*100;
          int va;if(aa==999)va=fgetc(inF);else if(aa==998)va=(self_pos<vm_size)?(unsigned char)buf[self_pos++]:EOF;else va=mem[(aa%1000+1000)%1000];
          if(va==EOF)va=-1;
          int vb=ab==999?0:mem[(ab%1000+1000)%1000];int res=vb-va;
          if(ab==999)fputc(res&255,outF);else mem[(ab%1000+1000)%1000]=res;
          if(res<=0){if(pc==ac)break;pc=ac;}else pc=(pc/10*10+10)%1000;
          }
          if(inF)fclose(inF);if(outF)fclose(outF);return 0;
          }
          EOF
          cat << 'EOF' > boot.c
          #include<stdio.h>
          #include<stdlib.h>
          int main(int argc,char**argv){
          if(argc<3)return 1;
          FILE*vm=fopen("vm.exe","rb");FILE*in=fopen(argv[1],"rb");FILE*out=fopen(argv[2],"wb");
          int c;while((c=fgetc(vm))!=EOF)fputc(c,out);fprintf(out,"_INCEP_");
          while((c=fgetc(in))!=EOF)fputc(c,out);
          fclose(vm);fclose(in);fclose(out);return 0;
          }
          EOF

      - name: 2. Compile Bootstrap & VM
        run: |
          gcc -O3 -o vm.exe vm.c
          gcc -O3 -o compiler.exe boot.c

      - name: 3. Forge compiler.asm (The True Compiler Source)
        run: |
          cat << 'EOF' > make_compiler.js
          const fs=require('fs');let asm=[];let pc=0;function S(a,b,c){asm.push(a%10,Math.floor(a/10)%10,Math.floor(a/100)%10);asm.push(b%10,Math.floor(b/10)%10,Math.floor(b/100)%10);asm.push(c%10,Math.floor(c/10)%10,Math.floor(c/100)%10);pc+=9;}let L1=pc;S(990,990,pc+9);S(998,990,pc+18);S(991,991,36);S(990,999,L1);function E(ch){S(990,990,pc+9);while(ch>=9){S(992,990,pc+9);ch-=9;}while(ch>=1){S(993,990,pc+9);ch-=1;}S(990,999,pc+9);}let chars=[95,73,78,67,69,80,95];for(let c of chars)E(c);let L3=pc;S(990,990,pc+9);S(999,990,pc+18);let h=pc;S(991,991,h);S(990,999,L3);while(asm.length<990)asm.push(0);asm.push(0,0,9,1);fs.writeFileSync('src.asm',asm.join(" "));
          EOF
          node make_compiler.js

      - name: 4. Assemble into compiler.inc
        run: |
          node assembler.js
          mv out.inut compiler.inc

      - name: 5. Self-Host Phase 1 (Gen 1)
        run: |
          chmod +x compiler.exe
          ./compiler.exe compiler.inc compiler1.exe

      - name: 6. Self-Host Phase 2 (Gen 2)
        run: |
          chmod +x compiler1.exe
          ./compiler1.exe compiler.inc compiler2.exe

      - name: 7. Self-Host Phase 3 (Gen 3)
        run: |
          chmod +x compiler2.exe
          ./compiler2.exe compiler.inc compiler3.exe

      - name: 8. Verify Fixed Point
        run: |
          sha256sum compiler1.exe compiler2.exe compiler3.exe
