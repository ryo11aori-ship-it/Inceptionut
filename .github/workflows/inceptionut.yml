name: Inceptionut_CI
on:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 1. Forge First Seed
        run: node generate_seed.js
      - name: 2. Run Native Binary (DIM 2 Encoder Test)
        run: echo -n "019" | node interpreter.js encoder.inc > compiled.inc && cat compiled.inc && echo ""

      - name: Extract Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echoinc-artifacts
          path: echo.inc