name: Inceptionut_CI
on:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 1. Generate Gen0 Native Compiler (ELF)
        run: node -e "const fs=require('fs');let h=[0x7F,0x45,0x4C,0x46,0x02,0x01,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x02,0x00,0x3E,0x00,0x01,0x00,0x00,0x00,0x78,0x00,0x40,0x00,0x00,0x00,0x00,0x00,0x40,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x40,0x00,0x38,0x00,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x01,0x00,0x00,0x00,0x05,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x40,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x40,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x10,0x00,0x00,0x00,0x00,0x00,0x00];let p=[0xb8,0x3c,0x00,0x00,0x00,0xbf,0x2a,0x00,0x00,0x00,0x0f,0x05];let t=h.length+p.length;h[96]=t&0xff;h[97]=(t>>8)&0xff;h[104]=t&0xff;h[105]=(t>>8)&0xff;fs.writeFileSync('compiler.exe',Buffer.from(h.concat(p)),{mode:0o755});"
      - name: 2. Test Gen0 Native Binary Execution
        run: ./compiler.exe || if [ $? -eq 42 ]; then echo "Success! Native ELF executed and returned 42."; else exit 1; fi
      - name: Extract Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiler-exe
          path: compiler.exe
