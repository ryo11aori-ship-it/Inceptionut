name:Inceptionut_CI
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on:ubuntu-latest
    steps:
      - name:Checkout
        uses:actions/checkout@v4
      - name:Setup_Node
        uses:actions/setup-node@v4
        with:
          node-version:20
      - name:Run_Interpreter
        run:node interpreter.js
