name: Inceptionut_True_Compiler_CI
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 追加した compiler.js と make_test_src.js を動かすステップ
      - name: 1. Test Semantic JS Compiler
        run: |
          echo "Generating test macro source..."
          node make_test_src.js
          
          echo "Compiling test source using compiler.js..."
          node compiler.js test_source.inc test.exe
          
          echo "Output generated. Size: $(wc -c < test.exe) bytes"
          echo "If test.exe is generated, Step 1 (Semantic JS Compiler) is successful!"
